{% extends "layout.html" %}

{% block content %}
<div class="main-content pb55 host-page">
			<div class="container-fluid">
				<div class="pos-box bgw mtb15">
					<div class="position f14 c9 pull-left">
							<a class="plr10 c4" href="/">首页</a>/<span class="plr10 c4">主机管理</span>
						</div>
					<div class="search pull-right">
						<form target="hid" onsubmit='getWeb(1,$("#SearchValue").prop("value"))'>
							<input type="text" id="SearchValue" class="ser-text pull-left" placeholder="主机搜索"/>
							<button type="button" class="ser-sub pull-left" onclick='getWeb(1,$("#SearchValue").prop("value"))'></button>
						</form>
						<iframe name='hid' id="hid" style="display:none"></iframe>
					</div>
				</div>
				<div class="safe bgw mtb15 pd15">
					<div class="flex align-center">
						<button onclick="openHostAdd()" class="btn btn-success btn-sm btn-title" type="button">添加主机</button>&nbsp;
						
						
						<div class="host_group_list ml-6">
							<span>主机分组:</span>
							<select class="bt-input-text">
							</select>
						</div>
						<button onclick="openHostGroupManage();" class="btn btn-default btn-sm btn-title ml-2" type="button">分组管理</button>
						
            
            <div id="refreshControl" class="ml-4">
							<div class="btn-group">
								<button class="btn btn-default btn-sm dropdown-toggle" type="button" data-toggle="dropdown">
									刷新间隔: <span id="currentInterval">60</span>秒
									<span class="caret"></span>
								</button>
								<ul class="dropdown-menu">
									<li><a href="javascript:;" onclick="setRefreshInterval(5)">5秒</a></li>
									<li><a href="javascript:;" onclick="setRefreshInterval(10)">10秒</a></li>
									<li><a href="javascript:;" onclick="setRefreshInterval(30)">30秒</a></li>
									<li><a href="javascript:;" onclick="setRefreshInterval(60)">1分钟</a></li>
								</ul>
							</div>
							<button id="toggleRefresh" class="btn btn-default btn-sm" onclick="toggleRefresh()">
								<span class="glyphicon glyphicon-pause"></span>
								<span>停止刷新</span>
							</button>
						</div>

						<span>
							<button  batch="true" style="float: right; margin-left: 10px;display: none;" onclick="batchDelete();" class="btn btn-default btn-sm">删除选中</button>
						</span>
					</div>
					<div class="divtable mtb10">
						<div class="tablescroll">
						<table class="table table-hover host-list-table">
							<colgroup>
								<col style="width: 36px;">
								<col style="width: 30px;">
								<col style="width: 120px;">
								<col style="width: 80px;">
								<col style="width: 80px;">
								<col style="width: 120px;">
								<col style="width: 120px;">
								<col style="width: 120px;">
								<col style="width: 100px;">
								<col style="width: 100px;">
								<col style="width: 100px;">
								<col style="width: 120px;">
								<col style="width: 120px;">
								<col style="width: 150px;">
								<col style="width: 220px;">
							</colgroup>
							<thead>
								<tr>
									<th class="text-center host-sticky-left host-sticky-left-1" width="36" title="拖动排序"></th>
									<th class="host-sticky-left host-sticky-left-2" width="30"><input type="checkbox" onclick="checkSelect();" id="setBox"></th>
									<th class="cursor: pointer text-center host-sticky-left host-sticky-left-3" width="120">主机名称/IP</th>
									<th class="cursor: pointer text-center host-sticky-left host-sticky-left-4" width="80">状态</th>
									<th class="cursor: pointer text-center host-sticky-left host-sticky-left-5" width="80">分组名称</th>
									<th class="cursor: pointer text-center" width="120" onclick="listOrder('load','host',this)">负载<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="120" onclick="listOrder('cpu','host',this)">CPU<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="120" onclick="listOrder('cpu','host',this)">内存<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="100" onclick="listOrder('cpu','host',this)">流量<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="100" onclick="listOrder('cpu','host',this)">总流量<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="100" onclick="listOrder('cpu','host',this)">磁盘读写<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="120" onclick="listOrder('cpu','host',this)">磁盘状态<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="120" onclick="listOrder('cpu','host',this)">报告概览<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center" width="150" onclick="listOrder('cpu','host',this)">更新时间<span hidden class="glyphicon glyphicon-triangle-top" style="margin-left:5px;color:#bbb"></span></th>
									<th class="cursor: pointer text-center host-action-col" width='220'>操作</th>
								</tr>
							</thead>
							<tbody id="webBody"></tbody>
						</table>
						</div>
						<div class="dataTables_paginate paging_bootstrap pagination">
							<ul id="webPage" class="page"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

<script type="text/javascript" src="/static/laydate/laydate.js?v={{config.version}}"></script>
<script type="text/javascript" src="/static/js/nunjucks.min.js?v={{config.version}}"></script>
<script type="text/javascript" src="/static/util/nunjuck.js?v={{config.version}}"></script>
<script type="text/javascript" src="/static/app/host.js?v={{config.version}}"></script>
<script type="text/javascript">		
setTimeout(function(){
	getWeb(1);
},500);
</script>

<style>
 .host-page {
    height: 100vh;
    padding-bottom: 55px;
    box-sizing: border-box;
    overflow: hidden;
 }
 .host-page > .container-fluid {
    height: 100%;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow: hidden;
 }
 .host-page .pos-box,
 .host-page .safe {
    margin: 0;
 }
 .host-page .safe {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
 }
 .host-page .divtable {
    flex: 1;
    min-height: 0;
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
 }
 .host-page .tablescroll {
    flex: 1;
    min-height: 0;
 }
 .host-page .dataTables_paginate {
    flex: 0 0 auto;
 }
 .panel_report table, .panel_report th, .panel_report td {
    border-width: 1px;
    border-collapse: collapse;
 }
 .panel_report td {
  padding: 3px;
 }
 .drop-shadow {
    --tw-drop-shadow: drop-shadow(1px 0px 0.1px rgb(0 0 0 / 75%)) drop-shadow(1px 1px 0.1px rgb(0 0 0 / 0.6));
    filter: var(--tw-blur) var(--tw-brightness) var(--tw-contrast) var(--tw-grayscale) var(--tw-hue-rotate) var(--tw-invert) var(--tw-saturate) var(--tw-sepia) var(--tw-drop-shadow);
 }
 .host-sort-handle {
    cursor: move;
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
    width: 16px;
    height: 16px;
    vertical-align: middle;
 }
 .host-sort-handle i {
    display: block;
    width: 14px;
    height: 2px;
    margin: 0 auto;
    border-radius: 999px;
    background: #c8c8c8;
 }
 .host-sort-handle.disabled {
    cursor: not-allowed;
 }
 .host-sort-handle.disabled i {
    background: #e6e6e6;
 }
 .host-list-table {
    min-width: 1516px;
    border: 0 none;
    table-layout: fixed;
 }
 .host-list-table th:first-child,
 .host-list-table td:first-child {
    width: 36px;
    min-width: 36px;
    max-width: 36px;
 }
 .host-list-table th:nth-child(2),
 .host-list-table td:nth-child(2) {
    width: 30px;
    min-width: 30px;
    max-width: 30px;
 }
 .host-list-table .host-sticky-left {
    position: sticky;
    left: 0;
    z-index: 2;
    background: #fff;
 }
 .host-list-table thead .host-sticky-left {
    z-index: 4;
    background: #f6f6f6;
 }
 .host-list-table .host-sticky-left-1 {
    left: 0;
 }
 .host-list-table .host-sticky-left-2 {
    left: 36px;
 }
 .host-list-table .host-sticky-left-3 {
    left: 66px;
 }
 .host-list-table .host-sticky-left-4 {
    left: 186px;
 }
 .host-list-table .host-sticky-left-5 {
    left: 266px;
    box-shadow: 10px 0 12px -12px rgba(0, 0, 0, 0.35);
 }
 .host-list-table .host-action-col {
    position: sticky;
    right: 0;
    z-index: 3;
    background: #fff;
    box-shadow: -10px 0 12px -12px rgba(0, 0, 0, 0.35);
 }
 .host-list-table thead .host-action-col {
    background: #f6f6f6;
 }
 .host-list-table tbody tr:hover .host-action-col {
    background: #f5f5f5;
 }
 .host-list-table tbody tr:hover .host-sticky-left {
    background: #f5f5f5;
 }
 .host-sort-placeholder td {
    background: #f7f7f7 !important;
 }
 .host-sort-selected td {
    background: #f5faff !important;
 }
 .host-sort-selected .host-sort-handle i {
    background: #20a53a;
 }
 .host_group_list {
    display: inline-flex;
    align-items: center;
    gap: 8px;
 }
 .host-sort-tip {
    margin-left: 14px;
    color: #888;
    font-size: 12px;
 }
 .host_group_list span {
    color: #666;
    margin-bottom: 0;
 }
 .detail-log-monitor-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2%;
    align-items: stretch;
    height: 510px;
  }
 .detail-log-path-panel {
    width: 30%;
    height: 100%;
    border: 1px solid #ebeef5;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(31, 35, 41, 0.04);
  }
 .detail-log-path-card {
    display: flex;
    flex-direction: column;
    height: 100%;
    margin-bottom: 0;
 }
 .detail-log-path-toolbar {
    padding: 12px 15px;
    border-top: 1px solid #f0f2f5;
    border-bottom: 1px solid #f0f2f5;
    background: #fff;
 }
 .detail-log-path-toolbar .bt-input-text {
    width: 100%;
    height: 34px;
    border-radius: 6px;
 }
 .detail-log-path-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    background: #fafbfc;
  }
 .log-path-list {
    margin: 0;
    padding: 0;
    list-style: none;
 }
 .log-tree-dir,
 .log-tree-children {
    margin: 0;
    padding: 0;
    list-style: none;
 }
 .log-tree-dir-title {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    color: #606266;
    font-size: 13px;
    font-weight: 600;
    background: #f7f9fb;
    border-bottom: 1px solid #eef1f5;
    cursor: pointer;
 }
 .log-tree-dir.collapsed > .log-tree-children {
    display: none;
 }
 .log-tree-caret {
    font-size: 12px;
    color: #909399;
 }
 .log-tree-dir-name {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
 }
 .log-path-item,
 .log-path-empty {
    padding: 12px 18px;
    border-bottom: 1px solid #f1f1f1;
 }
 .log-path-item {
    cursor: pointer;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
    background: #fff;
 }
 .log-path-item:hover {
    background: #f7faf7;
 }
 .log-path-item-main {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 20px;
 }
 .log-path-item-main .glyphicon {
    color: #8c8c8c;
 }
 .log-path-item-info {
    min-width: 0;
    flex: 1;
 }
 .log-path-item.active {
    background: #f5fbf5;
    border-left-color: #20a53a;
 }
 .log-path-item.active .log-path-text {
    color: #20a53a;
 }
 .log-path-item.active .glyphicon {
    color: #20a53a;
 }
 .log-path-text,
 .detail-log-headline,
  .detail-log-meta {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
 }
 .log-path-text {
    font-weight: 600;
    color: #303133;
 }
 .log-path-highlight {
    padding: 0 2px;
    border-radius: 3px;
    background: #fff2b3;
    color: #8a5a00;
 }
 .log-path-meta,
 .detail-log-label {
    color: #999;
 }
 .log-path-meta {
    margin-top: 4px;
    font-size: 12px;
 }
 .log-path-empty {
    color: #999;
    text-align: center;
    padding-top: 40px;
 }
 .detail-log-content-panel {
    width: 68%;
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 .detail-log-header-card {
    border: 1px solid #ebeef5;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(31, 35, 41, 0.04);
    flex: 0 0 auto;
  }
 .detail-log-headline {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #303133;
 }
 .detail-log-headline .path {
    font-weight: 600;
    color: #1f2329;
 }
 .detail-log-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 14px;
 }
 .detail-log-meta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    background: #f5f7fa;
    color: #606266;
    max-width: 100%;
 }
 .detail-log-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
    flex-wrap: wrap;
    padding-top: 15px;
    border-top: 1px dashed #ebeef5;
 }
 .detail-log-toolbar .bt-input-text {
    flex: 1;
    min-width: 220px;
    height: 34px;
    border-radius: 6px;
 }
 .detail-log-content {
    flex: 1;
    min-height: 0;
    overflow: auto;
    border: 1px solid #ebeef5;
    border-radius: 10px;
    background: #fcfcfd;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
  }
 .detail-log-pagination {
    flex: 0 0 auto;
    margin: 0;
    padding: 0 4px;
 }
 .detail-log-empty {
    color: #999;
    text-align: center;
    padding: 120px 0;
 }
 .detail-log-line {
    padding: 14px 0;
    border-bottom: 1px solid #f1f1f1;
  }
 .detail-log-line:first-child {
    padding-top: 0;
 }
 .detail-log-line:last-child {
    border-bottom: 0 none;
    padding-bottom: 0;
 }
 .detail-log-time {
    color: #909399;
    margin-bottom: 8px;
    font-size: 12px;
 }
 .detail-log-text {
    margin: 0;
    padding: 0;
    border: 0 none;
    background: transparent;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 12px;
    line-height: 1.7;
    font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
    color: #303133;
 }
 .detail-log-label {
    color: #909399;
    font-size: 12px;
    letter-spacing: 0.5px;
 }
 .detail-log-summary-badge {
    max-width: 100%;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
 }
 #detailLogPage > div {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
 }
 #detailLogPage a,
 #detailLogPage span {
    margin: 0;
 }
 #detailLogPage .Pcurrent {
    min-width: 30px;
    height: 30px;
    line-height: 30px;
    text-align: center;
    border-radius: 6px;
    background: #20a53a;
    color: #fff;
 }
 #detailLogPage .Pnum,
 #detailLogPage .Pstart,
 #detailLogPage .Ppren,
 #detailLogPage .Pnext,
 #detailLogPage .Pend {
    min-width: 30px;
    height: 30px;
    line-height: 30px;
    padding: 0 10px;
    text-align: center;
    border: 1px solid #dcdfe6;
    border-radius: 6px;
    color: #606266;
    background: #fff;
 }
 #detailLogPage .Pcount {
    color: #909399;
 }
  @media (max-width: 991px) {
    .detail-log-monitor-wrap {
      height: auto;
    }
    .detail-log-path-panel,
    .detail-log-content-panel {
      width: 100%;
    }
    .detail-log-path-panel {
      height: 260px;
    }
    .detail-log-content-panel {
      height: auto;
    }
    .detail-log-content {
      height: 360px;
      flex: none;
    }
  }
</style>
{% endblock %}
