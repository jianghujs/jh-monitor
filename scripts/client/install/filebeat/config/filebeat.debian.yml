###################### Filebeat Configuration Example #########################

# This file is an example configuration file highlighting only the most common
# options. The filebeat.reference.yml file from the same directory contains all the
# supported options with more comments. You can use it as a reference.
#
# You can find the full configuration reference here:
# https://www.elastic.co/guide/en/beats/filebeat/index.html

# For more available modules and options, please see the filebeat.reference.yml sample
# configuration file.

# ============================== Filebeat inputs ===============================

name: "<hostId>"

filebeat.inputs:

- type: log
  enabled: true
  paths:
    - /home/ansible_user/jh-monitor-data/host-debian-system-status-*.json
    - /home/ansible/jh-monitor-data/host-debian-system-status-*.json
  json.keys_under_root: true
  json.add_error_key: true
  fields:
    log_index: host-debian-system-status

- type: log
  enabled: true
  paths:
    - /home/ansible_user/jh-monitor-data/host-debian-xtrabackup-*.ndjson
    - /home/ansible/jh-monitor-data/host-debian-xtrabackup-*.ndjson
  json.keys_under_root: true
  json.add_error_key: true
  fields:
    log_index: host-debian-xtrabackup

- type: log
  enabled: true
  paths:
    - /home/ansible_user/jh-monitor-data/host-debian-xtrabackup-inc-*.ndjson
    - /home/ansible/jh-monitor-data/host-debian-xtrabackup-inc-*.ndjson
  json.keys_under_root: true
  json.add_error_key: true
  fields:
    log_index: host-debian-xtrabackup-inc

- type: log
  enabled: true
  paths:
    - /home/ansible_user/jh-monitor-data/host-debian-backup-*.ndjson
    - /home/ansible/jh-monitor-data/host-debian-backup-*.ndjson
  json.keys_under_root: true
  json.add_error_key: true
  fields:
    log_index: host-debian-backup

# Common
- type: log
  enabled: true
  paths:
    - /var/log/*.log
    - /www/wwwlogs/*.log
    - /www/server/mysql-apt/data/*.log
    - /www/server/jh-panel/logs/report.log
  fields:
    log_type: common

# Syslog Logs
- type: filestream
  id: syslog
  enabled: true
  paths:
    - /var/log/syslog
  exclude_files: ['\.gz$']
  fields:
    log_type: syslog
  fields_under_root: true
  parsers:
    - syslog:
        format: auto

# Nginx Logs
- type: filestream
  id: nginx
  enabled: true
  paths:
    - /www/wwwlogs/*.log
    - /www/server/openresty/nginx/logs/error.log
  fields:
    log_type: nginx
  fields_under_root: true
  exclude_files: ['\.log_\d{4}-\d{2}-\d{2}_\d{6}\.log$']

# MySQL Logs
- type: filestream
  id: mysql-error
  enabled: true
  paths:
    - /www/server/mysql-apt/data/error.log
  fields:
    log_type: mysql
    mysql_log_type: error
  fields_under_root: true
  prospector.scanner.check_interval: 10s
  close_inactive: 5m
  parsers:
    - multiline:
        type: pattern
        pattern: '^\d{4}-\d{2}-\d{2}'
        negate: true
        match: after

- type: filestream
  id: mysql-slow
  enabled: true
  paths:
    - /www/server/mysql-apt/data/mysql-slow.log
  fields:
    log_type: mysql
    mysql_log_type: slow
  fields_under_root: true
  prospector.scanner.check_interval: 10s
  close_inactive: 5m
  parsers:
    - multiline:
        type: pattern
        pattern: '^(# Time:)'
        negate: true
        match: after

# EggJS Logs
- type: filestream
  id: eggjs
  enabled: true
  paths:
    - /www/wwwroot/*/logs/egg-web.log
    - /www/wwwroot/*/logs/egg-schedule.log
    - /www/wwwroot/*/logs/*-web.log
    - /www/wwwroot/*/logs/*.resource.log
  exclude_files: ['.gz$', '.tar$', '.json.log$']
  fields:
    log_type: eggjs
    app_type: nodejs
  fields_under_root: true
  parsers:
    - multiline:
        type: pattern
        pattern: '^\[\d{4}-\d{2}-\d{2}|^\d{4}-\d{2}-\d{2}'
        negate: true
        match: after

# JHPanel Logs
- type: filestream
  id: jh-panel
  enabled: true
  paths:
    - /www/server/jh-panel/logs/report.log
  fields:
    log_type: jh-panel
  fields_under_root: true

# ============================== Filebeat modules ==============================

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false
  reload.period: 10s

# ======================= Elasticsearch template setting =======================

setup.template.settings:
  index.number_of_shards: 1
  index.codec: best_compression
  index.refresh_interval: "5s"

setup.ilm.enabled: true
setup.ilm.check_exists: true

setup.template.name: "host-debian-<hostIdIndex>-logs"
setup.template.pattern: "host-debian-<hostIdIndex>-*"
setup.template.enabled: true
setup.template.overwrite: true
setup.template.priority: 200

# =================================== Kibana ===================================

# Starting with Beats version 6.0.0, the dashboards are loaded via the Kibana API.
# This requires a Kibana endpoint configuration.
setup.kibana:

  # Kibana Host
  # Scheme and port can be left out and will be set to the default (http and 5601)
  # In case you specify and additional path, the scheme is required: http://localhost:5601/path
  # IPv6 addresses should always be defined as: https://[2001:db8::1]:5601
  host: "<serverIp>:5601"
  username: "elastic"
  password: "changeme"

  # Kibana Space ID
  # ID of the Kibana Space into which the dashboards should be loaded. By default,
  # the Default Space will be used.
  #space.id:

# =============================== Elastic Cloud ================================

# These settings simplify using Filebeat with the Elastic Cloud (https://cloud.elastic.co/).

# The cloud.id setting overwrites the `output.elasticsearch.hosts` and
# `setup.kibana.host` options.
# You can find the `cloud.id` in the Elastic Cloud web UI.
#cloud.id:

# The cloud.auth setting overwrites the `output.elasticsearch.username` and
# `output.elasticsearch.password` settings. The format is `<user>:<pass>`.
#cloud.auth:

# ================================== Outputs ===================================

# Configure what output to use when sending the data collected by the beat.

# ---------------------------- Elasticsearch Output ----------------------------
output.elasticsearch:
  hosts: ["<serverIp>:9200"]
  indices:
    - index: "host-debian-<hostIdIndex>-system-status-%{+yyyy.MM}"
      when.equals:
        fields.log_index: "host-debian-system-status"
    - index: "host-debian-<hostIdIndex>-xtrabackup-%{+yyyy.MM}"
      when.equals:
        fields.log_index: "host-debian-xtrabackup"
    - index: "host-debian-<hostIdIndex>-xtrabackup-inc-%{+yyyy.MM}"
      when.equals:
        fields.log_index: "host-debian-xtrabackup-inc"
    - index: "host-debian-<hostIdIndex>-backup-%{+yyyy.MM}"
      when.equals:
        fields.log_index: "host-debian-backup"
    - index: "host-debian-<hostIdIndex>-syslog-%{+yyyy.MM}"
      when.equals:
        log_type: "syslog"
    - index: "host-debian-<hostIdIndex>-nginx-%{+yyyy.MM}"
      when.equals:
        log_type: "nginx"
    - index: "host-debian-<hostIdIndex>-eggjs-%{+yyyy.MM}"
      when.equals:
        log_type: "eggjs"
    - index: "host-debian-<hostIdIndex>-mysql-%{+yyyy.MM}"
      when.equals:
        log_type: "mysql"
    - index: "host-debian-<hostIdIndex>-jh-panel-%{+yyyy.MM}"
      when.equals:
        log_type: "jh-panel"
  pipelines:
    - pipeline: "nginx-pipeline"
      when.equals:
        log_type: "nginx"
  preset: balanced

  # Protocol - either `http` (default) or `https`.
  #protocol: "https"

  # Authentication credentials - either API key or username/password.
  #api_key: "id:api_key"
  username: "elastic"
  password: "changeme"

# ------------------------------ Logstash Output -------------------------------
#output.logstash:
  # The Logstash hosts
  #hosts: ["localhost:5044"]

  # Optional SSL. By default is off.
  # List of root certificates for HTTPS server verifications
  #ssl.certificate_authorities: ["/etc/pki/root/ca.pem"]

  # Certificate for SSL client authentication
  #ssl.certificate: "/etc/pki/client/cert.pem"

  # Client Certificate Key
  #ssl.key: "/etc/pki/client/cert.key"

# ================================= Processors =================================

processors:
  - add_fields:
      target: ''
      fields:
        host_id: "<hostId>"
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# ================================== Logging ===================================

# Sets log level. The default log level is info.
# Available log levels are: error, warning, info, debug
#logging.level: debug

# At debug level, you can selectively enable logging only for some components.
# To enable all selectors, use ["*"]. Examples of other selectors are "beat",
# "publisher", "service".
#logging.selectors: ["*"]

# ============================= X-Pack Monitoring ==============================
# Filebeat can export internal metrics to a central Elasticsearch monitoring
# cluster.  This requires xpack monitoring to be enabled in Elasticsearch.  The
# reporting is disabled by default.

# Set to true to enable the monitoring reporter.
#monitoring.enabled: false

# Sets the UUID of the Elasticsearch cluster under which monitoring data for this
# Filebeat instance will appear in the Stack Monitoring UI. If output.elasticsearch
# is enabled, the UUID is derived from the Elasticsearch cluster referenced by output.elasticsearch.
#monitoring.cluster_uuid:

# Uncomment to send the metrics to Elasticsearch. Most settings from the
# Elasticsearch outputs are accepted here as well.
# Note that the settings should point to your Elasticsearch *monitoring* cluster.
# Any setting that is not set is automatically inherited from the Elasticsearch
# output configuration, so if you have the Elasticsearch output configured such
# that it is pointing to your Elasticsearch monitoring cluster, you can simply
# uncomment the following line.
#monitoring.elasticsearch:

# ============================== Instrumentation ===============================

# Instrumentation support for the filebeat.
#instrumentation:
    # Set to true to enable instrumentation of filebeat.
    #enabled: false

    # Environment in which filebeat is running on (eg: staging, production, etc.)
    #environment: ""

    # APM Server hosts to report instrumentation results to.
    #hosts:
    #  - http://localhost:8200

    # API Key for the APM Server(s).
    # If api_key is set then secret_token will be ignored.
    #api_key:

    # Secret token for the APM Server(s).
    #secret_token:


# ================================= Migration ==================================

# This allows to enable 6.7 migration aliases
