###################### Filebeat Configuration #########################

# https://www.elastic.co/guide/en/beats/filebeat/index.html

# ============================== Shipper name ================================

name: "<hostId>"

# ============================== Filebeat modules ==============================

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  enabled: false

# ============================== Filebeat inputs ==============================

# Host and task inputs are loaded from /etc/filebeat/inputs.d/*.yml.
# - host-pve.yml: PVE host log inputs (installed by jh-monitor host installer)
# - jh-monitor-task-<TASK_ID>.yml: per-task inputs (installed by monitor_task.sh)
filebeat.config.inputs:
  enabled: true
  path: /etc/filebeat/inputs.d/*.yml
  reload.enabled: true
  reload.period: 10s

# ======================= Elasticsearch template setting =======================

setup.template.settings:
  index.number_of_shards: 1
  #index.codec: best_compression
  #_source.enabled: false

setup.ilm.enabled: true
setup.ilm.check_exists: true

setup.template.name: "host-pve-<hostIdIndex>-logs"
setup.template.pattern: "host-pve-<hostIdIndex>-*"
setup.template.enabled: true
setup.template.overwrite: false
setup.template.priority: 200

# =================================== Kibana ===================================

setup.kibana:
  host: "<serverIp>:5601"
  username: "elastic"
  password: "changeme"

# ================================== Outputs ===================================

# ---------------------------- Elasticsearch Output ----------------------------
output.elasticsearch:
  hosts: ["<serverIp>:9200"]
  indices:
    - index: "host-pve-<hostIdIndex>-system-status-%{+yyyy.MM}"
      when.equals:
        log_index: "host-pve-system-status"

  preset: balanced

  # Protocol - either `http` (default) or `https`.
  #protocol: "https"

  # Authentication credentials - either API key or username/password.
  #api_key: "id:api_key"
  username: "elastic"
  password: "changeme"

# ------------------------------ Logstash Output -------------------------------
#output.logstash:
  #hosts: ["localhost:5044"]
  #ssl.certificate_authorities: ["/etc/pki/root/ca.pem"]
  #ssl.certificate: "/etc/pki/client/cert.pem"
  #ssl.key: "/etc/pki/client/cert.key"

# ================================= Processors =================================

processors:
  - add_fields:
      target: ''
      fields:
        host_id: "<hostId>"
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# ================================== Logging ===================================

#logging.level: debug
#logging.selectors: ["*"]

# ============================= X-Pack Monitoring ==============================
#monitoring.enabled: false
#monitoring.cluster_uuid:
#monitoring.elasticsearch:

# ============================== Instrumentation ===============================
